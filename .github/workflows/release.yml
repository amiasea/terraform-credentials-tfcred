name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26
          cache: false

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  unit_tests:
    name: Unit Tests
    needs: [lint]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26

      - name: Unit Tests
        run: go test ./cmd/tfcred/commands/... -v

  e2e_tests:
    name: E2E Tests
    runs-on: windows-latest
    needs: [unit_tests, lint]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: 1.26

      - name: Install Terraform CLI
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.8
          terraform_wrapper: false

      - name: Install Mage
        run: go install github.com/magefile/mage@latest

      - name: E2E Tests
        env:
          TF_TOKEN_ORG: ${{ secrets.TF_TOKEN_ORG }}
        run: |
          mage E2E
          go test ./e2e/... -v -count=1

  build_release:
    if: false
    name: Build Release
    runs-on: windows-latest
    needs: [lint, unit_tests, e2e_tests]
    permissions:
      contents: write
      pull-requests: write
      actions: write
      id-token: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26

      - name: Extract metadata
        id: meta
        shell: pwsh
        run: |
          $rawVersion = "${{ github.ref_name }}"
          $cleanVersion = $rawVersion -replace '^v', ''

          "version=$cleanVersion" >> $env:GITHUB_OUTPUT
          "tag=$rawVersion" >> $env:GITHUB_OUTPUT

      - name: GoReleaser (build artifacts)
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  resolve_release_asset:
    name: Resolve Release Asset
    needs: [build_release]
    runs-on: ubuntu-latest

    outputs:
      installer_url: ${{ steps.assets.outputs.installer_url }}

    steps:
      - name: Resolve release assets
        id: assets
        uses: actions/github-script@v9
        env:
          INPUT_TAG: ${{ needs.build_release.outputs.tag }}

        with:
          script: |
            const tag = process.env.INPUT_TAG;

            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag
            });

            const match = release.data.assets.find(a =>
              a.name.toLowerCase().includes("windows") &&
              a.name.toLowerCase().includes("amd64") &&
              a.name.endsWith(".zip")
            );

            if (!match) {
              throw new Error("Windows AMD64 zip not found");
            }

            core.setOutput(
              "installer_url",
              match.browser_download_url
            );

      - name: Summary
        run: |
          echo "## Release Asset Resolved" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ needs.build_release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- URL: ${{ steps.assets.outputs.installer_url }}" >> $GITHUB_STEP_SUMMARY

  compute_installer_sha:
    name: Compute Installer SHA256
    needs:
      - build_release
      - resolve_release_asset

    runs-on: ubuntu-latest

    outputs:
      sha: ${{ steps.crypto.outputs.sha }}

    steps:
      - name: Download installer and compute SHA256
        id: crypto
        env:
          INSTALLER_URL: ${{ needs.resolve_release_asset.outputs.installer_url }}

        run: |
          set -euo pipefail

          curl -L "$INSTALLER_URL" -o artifact.zip

          SHA=$(sha256sum artifact.zip | awk '{print $1}')

          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "## Installer SHA256 Computed" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ needs.build_release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- SHA256: ${{ steps.crypto.outputs.sha }}" >> $GITHUB_STEP_SUMMARY
  
  generate_manifests:
    name: Generate WinGet Manifests
    needs:
      - build_release
      - resolve_release_asset
      - compute_installer_sha

    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Generate manifest files
        shell: pwsh
        env:
          VERSION: ${{ needs.build_release.outputs.version }}
          INSTALLER_URL: ${{ needs.resolve_release_asset.outputs.installer_url }}
          INSTALLER_SHA: ${{ needs.compute_installer_sha.outputs.sha }}

        run: |
          ./scripts/gen-winget.ps1 `
            -Version "$env:VERSION" `
            -InstallerUrl "$env:INSTALLER_URL" `
            -InstallerSha256 "$env:INSTALLER_SHA"

      - name: Check WinGet version
        shell: pwsh
        run: |
          winget --info

      - name: Upload WinGet manifests
        uses: actions/upload-artifact@v7
        with:
          name: winget-manifests
          path: manifests

      - name: Summary
        shell: pwsh
        run: |
          @"
          ## WinGet Manifests Generated

          - Version: ${{ needs.build_release.outputs.version }}
          - Location: manifests/a/amiasea/tfcred/${{ needs.build_release.outputs.version }}
          "@ >> $env:GITHUB_STEP_SUMMARY

  validate_winget_manifest:
    name: Validate WinGet Manifest
    needs:
      - build_release
      - generate_manifests

    runs-on: windows-latest

    steps:
      - name: Download generated manifests
        uses: actions/download-artifact@v4
        with:
          name: winget-manifests
          path: manifests

      # - name: Validate manifest
      #   shell: pwsh
      #   run: |
      #     winget validate --manifest "manifests/a/amiasea/tfcred/${{ needs.build_release.outputs.version }}"

      - name: Summary
        shell: pwsh
        run: |
          @"
          ## WinGet Manifest Validation Successful

          - Version: ${{ needs.build_release.outputs.version }}
          "@ >> $env:GITHUB_STEP_SUMMARY

  submit_winget_pr:
    name: Submit to microsoft/winget-pkgs
    needs:
      - build_release
      - generate_manifests
      - validate_winget_manifest

    runs-on: ubuntu-latest

    steps:
      - name: Download validated WinGet manifests
        uses: actions/download-artifact@v4
        with:
          name: winget-manifests
          path: manifests

      - name: Az CLI Login via OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch Secret from Azure Key Vault
        uses: azure/get-keyvault-secrets@v1
        with:
          keyvault: kv-amiasea
          secrets: amiasea-github-private-key
        id: kv-fetch

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.AMIASEA_GH_APP_CLIENT_ID }}
          private-key: ${{ steps.kv-fetch.outputs.amiasea-github-private-key }}
          owner: amiasea
          repositories: winget-pkgs

      - name: Commit manifests to amiasea/winget-pkgs
        id: commit-manifests
        uses: actions/github-script@v9
        env:
          INPUT_VERSION: ${{ needs.build_release.outputs.version }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}

          script: |
            const fs = require('fs');

            const version = process.env.INPUT_VERSION;

            const manifestPath = `manifests/a/amiasea/tfcred/${version}`;

            const files = [
              `${manifestPath}/amiasea.tfcred.yaml`,
              `${manifestPath}/amiasea.tfcred.installer.yaml`,
              `${manifestPath}/amiasea.tfcred.locale.en-US.yaml`
            ];

            const branchName = `winget-update-tfcred-${version}`;

            const masterRef = await github.rest.git.getRef({
              owner: 'amiasea',
              repo: 'winget-pkgs',
              ref: 'heads/master'
            });

            await github.rest.git.createRef({
              owner: 'amiasea',
              repo: 'winget-pkgs',
              ref: `refs/heads/${branchName}`,
              sha: masterRef.data.object.sha
            });

            const commit = await github.rest.git.getCommit({
              owner: 'amiasea',
              repo: 'winget-pkgs',
              commit_sha: masterRef.data.object.sha
            });

            const blobs = [];

            for (const file of files) {
              const content = fs.readFileSync(file, 'utf8');

              const blob = await github.rest.git.createBlob({
                owner: 'amiasea',
                repo: 'winget-pkgs',
                content,
                encoding: 'utf-8'
              });

              blobs.push({
                path: file,
                mode: '100644',
                type: 'blob',
                sha: blob.data.sha
              });
            }

            const tree = await github.rest.git.createTree({
              owner: 'amiasea',
              repo: 'winget-pkgs',
              base_tree: commit.data.tree.sha,
              tree: blobs
            });

            const newCommit = await github.rest.git.createCommit({
              owner: 'amiasea',
              repo: 'winget-pkgs',
              message: `feat: add amiasea.tfcred version ${version} manifests`,
              tree: tree.data.sha,
              parents: [
                masterRef.data.object.sha
              ]
            });

            await github.rest.git.updateRef({
              owner: 'amiasea',
              repo: 'winget-pkgs',
              ref: `heads/${branchName}`,
              sha: newCommit.data.sha
            });

      - name: Create PR to microsoft/winget-pkgs
        id: submit-pr
        uses: actions/github-script@v9
        env:
          INPUT_VERSION: ${{ needs.build_release.outputs.version }}

        with:
          github-token: ${{ secrets.WINGET_CLASSIC_PAT }}

          script: |
            const version = process.env.INPUT_VERSION;

            const branchName = `winget-update-tfcred-${version}`;

            const pr = await github.rest.pulls.create({
              owner: 'microsoft',
              repo: 'winget-pkgs',
              title: `New version: amiasea.tfcred version ${version}`,
              body: `Automated WinGet submission update for amiasea.tfcred version ${version}.`,
              head: `amiasea:${branchName}`,
              base: 'master'
            });

            core.setOutput(
              "pr_url",
              pr.data.html_url
            );

      - name: Summary
        run: |
          echo "## Winget PR Created Successfully" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ needs.build_release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- PR: ${{ steps.submit-pr.outputs.pr_url }}" >> $GITHUB_STEP_SUMMARY