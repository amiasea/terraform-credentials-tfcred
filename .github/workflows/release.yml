name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26
          cache: false
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  unit_tests:
    name: Unit Tests
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26
      - name: Unit Tests
        run: go test ./cmd/tfcred/commands/... -v

  e2e_tests:
    name: E2E Tests
    runs-on: windows-latest
    needs: [unit_tests, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26
      - name: GoReleaser snapshot build
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --snapshot --clean
      - name: Install Terraform CLI
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.8
          terraform_wrapper: false
      - name: E2E Tests
        env:
          TF_CLI_CONFIG_FILE: ${{ github.workspace }}/tests/e2e/terraform.tfrc.json
          TF_TOKEN_ORG: ${{ secrets.TF_TOKEN_ORG }}
        run: go test ./tests/e2e/... -v -count=1

  build_release:
    name: Build Release
    runs-on: windows-latest
    needs: [unit_tests, lint]
    permissions:
      contents: write
      pull-requests: write
      actions: write
      id-token: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26
      - name: Extract metadata
        id: meta
        shell: pwsh
        run: |
          $rawVersion = "${{ github.ref_name }}"
          $cleanVersion = $rawVersion -replace '^v', ''
          "version=$cleanVersion" >> $env:GITHUB_OUTPUT
          "tag=$rawVersion" >> $env:GITHUB_OUTPUT
      - name: GoReleaser (build artifacts)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate_winget:
    name: Validate Winget Assets
    needs: [build_release]
    runs-on: ubuntu-latest
    outputs:
      installer_url: ${{ steps.assets.outputs.installer_url }}
      sha: ${{ steps.crypto.outputs.sha }}
    steps:
      - name: Resolve release assets
        id: assets
        uses: actions/github-script@v7
        env:
          INPUT_TAG: ${{ needs.build_release.outputs.tag }}
        with:
          script: |
            const tag = process.env.INPUT_TAG;
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag
            });
            const match = release.data.assets.find(a => 
              a.name.toLowerCase().includes("windows") && 
              a.name.toLowerCase().includes("amd64") && 
              a.name.endsWith(".zip")
            );
            if (!match) throw new Error("Windows AMD64 zip not found");
            core.setOutput("installer_url", match.browser_download_url);

      - name: Download and compute SHA256
        id: crypto
        env:
          INSTALLER_URL: ${{ steps.assets.outputs.installer_url }}
        run: |
          set -euo pipefail
          curl -L "$INSTALLER_URL" -o artifact.zip
          SHA=$(sha256sum artifact.zip | awk '{print $1}')
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Validation Summary
        run: |
          echo "## Winget Validation Successful" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ needs.build_release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- SHA256: ${{ steps.crypto.outputs.sha }}" >> $GITHUB_STEP_SUMMARY

  submit_winget_pr:
    name: Submit to microsoft/winget-pkgs
    needs: [build_release, validate_winget]
    runs-on: ubuntu-latest
    steps:
      - name: Az CLI Login via OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch Secret from Azure Key Vault
        uses: azure/get-keyvault-secrets@v1
        with:
          keyvault: 'kv-amiasea'
          secrets: 'amiasea-github-private-key'
        id: kv-fetch

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.AMIASEA_GH_APP_CLIENT_ID }}
          private-key: ${{ steps.kv-fetch.outputs.amiasea-github-private-key }}
          owner: amiasea
          repositories: winget-pkgs

      - name: Commit manifests to amiasea/winget-pkgs
        id: commit-manifests
        uses: actions/github-script@v7
        env:
          INPUT_VERSION: ${{ needs.build_release.outputs.version }}
          INSTALLER_URL: ${{ needs.validate_winget.outputs.installer_url }}
          INSTALLER_SHA: ${{ needs.validate_winget.outputs.sha }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const version = process.env.INPUT_VERSION;
            const url = process.env.INSTALLER_URL;
            const sha = process.env.INSTALLER_SHA;
            
            const file1Content = `# yaml-language-server: $schema=https://aka.ms/winget-manifest.version.1.12.0
            PackageIdentifier: amiasea.tfcred
            PackageVersion: ${version}
            DefaultLocale: en-US
            ManifestType: version
            ManifestVersion: 1.12.0`;

            const file2Content = `# yaml-language-server: $schema=https://aka.ms/winget-manifest.installer.1.12.0
            PackageIdentifier: amiasea.tfcred
            PackageVersion: ${version}
            InstallerLocale: en-US
            Architecture: x64
            InstallerType: zip
            NestedInstallerType: custom
            Scope: user
            InstallModes:
              - silent
              - silentWithProgress
            InstallerSwitches:
              Silent: -NoProfile -ExecutionPolicy Bypass -File .\\install.ps1 -Mode install
              SilentWithProgress: -NoProfile -ExecutionPolicy Bypass -File .\\install.ps1 -Mode install
              Custom: -NoProfile -ExecutionPolicy Bypass -File .\\install.ps1 -Mode install
              Upgrade: -NoProfile -ExecutionPolicy Bypass -File .\\install.ps1 -Mode upgrade
            UninstallCommand: powershell.exe -NoProfile -ExecutionPolicy Bypass -File "%USERPROFILE%\\AppData\\Local\\Programs\\tfcred\\uninstall.ps1"
            Commands:
              - tfcred
              - terraform-credentials-tfcred
            NestedInstallerFiles:
              - RelativeFilePath: install.ps1
            ArchiveBinariesDependOnPath: true
            Installers:
              - Architecture: x64
                InstallerUrl: ${url}
                InstallerSha256: ${sha}
            AppsAndFeaturesEntries:
              - DisplayName: tfcred
                Publisher: amiasea
                DisplayVersion: ${version}
                ProductCode: tfcred-v${version}
            ManifestType: installer
            ManifestVersion: 1.12.0`;

            const file3Content = `# yaml-language-server: $schema=https://aka.ms/winget-manifest.defaultLocale.1.12.0
            PackageIdentifier: amiasea.tfcred
            PackageVersion: ${version}
            PackageLocale: en-US
            Publisher: amiasea
            PackageName: tfcred
            License: MIT
            ShortDescription: Terraform credential context manager
            ManifestType: defaultLocale
            ManifestVersion: 1.12.0`;
            
            const manifestPath = `manifests/a/amiasea/tfcred/${version}`;

            const branchName = `winget-update-tfcred-${version}`;

            const masterRef = await github.rest.git.getRef({
              owner: 'amiasea',
              repo: 'winget-pkgs',
              ref: 'heads/master'
            });

            await github.rest.git.createRef({
              owner: 'amiasea',
              repo: 'winget-pkgs',
              ref: `refs/heads/${branchName}`,
              sha: masterRef.data.object.sha
            });

            const branchCommit = await github.rest.git.getCommit({
              owner: 'amiasea',
              repo: 'winget-pkgs',
              commit_sha: masterRef.data.object.sha
            });

            const blobs = [];

            for (const [path, content] of [
              [`${manifestPath}/amiasea.tfcred.yaml`, file1Content],
              [`${manifestPath}/amiasea.tfcred.installer.yaml`, file2Content],
              [`${manifestPath}/amiasea.tfcred.locale.en-US.yaml`, file3Content]
            ]) {
              const blob = await github.rest.git.createBlob({
                owner: 'amiasea',
                repo: 'winget-pkgs',
                content,
                encoding: 'utf-8'
              });

              blobs.push({
                path,
                mode: '100644',
                type: 'blob',
                sha: blob.data.sha
              });
            }

            const tree = await github.rest.git.createTree({
              owner: 'amiasea',
              repo: 'winget-pkgs',
              base_tree: branchCommit.data.tree.sha,
              tree: blobs
            });

            const newCommit = await github.rest.git.createCommit({
              owner: 'amiasea',
              repo: 'winget-pkgs',
              message: `feat: add amiasea.tfcred version ${version} manifests`,
              tree: tree.data.sha,
              parents: [masterRef.data.object.sha]
            });

            await github.rest.git.updateRef({
              owner: 'amiasea',
              repo: 'winget-pkgs',
              ref: `heads/${branchName}`,
              sha: newCommit.data.sha
            });

      - name: Create PR to micrososft/winget-pkgs
        id: submit-pr
        uses: actions/github-script@v7
        env:
          INPUT_VERSION: ${{ needs.build_release.outputs.version }}
        with:
          github-token: ${{ secrets.WINGET_CLASSIC_PAT }}
          script: |
            const version = process.env.INPUT_VERSION;
            const branchName = `winget-update-tfcred-${version}`;

            const pr = await github.rest.pulls.create({
              owner: 'microsoft',
              repo: 'winget-pkgs',
              title: `New version: amiasea.tfcred version ${version}`,
              body: `Automated WinGet submission update for amiasea.tfcred version ${version}.`,
              head: `amiasea:${branchName}`,
              base: 'master'
            });

            core.setOutput("pr_url", pr.data.html_url);
      - name: Summary
        run: |
            echo "## Winget PR Created Successfully" >> $GITHUB_STEP_SUMMARY
            echo "- Version: ${{ needs.build_release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
            echo "- PR: ${{ steps.submit-pr.outputs.pr_url }}" >> $GITHUB_STEP_SUMMARY
