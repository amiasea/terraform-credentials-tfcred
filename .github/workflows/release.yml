name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# CRITICAL: id-token: write is required for Azure OIDC passwordless authentication
permissions:
  contents: write
  pull-requests: write
  id-token: write 

jobs:
  # --- Step 1: Lint Codebase Against Root .golangci.yml ---
  lint:
    name: lint code
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26
          cache: false # golangci-lint-action manages its own optimized caching internally

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  # --- Step 2: Run Unit Tests ---
  test:
    name: unit tests
    if: false
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26

      # ----------------------------------------------------------------------
      # Unit Tests
      # ----------------------------------------------------------------------
      - name: Unit Tests
        run: |
          # Run Unit Tests
          go test ./cmd/tfcred/commands/... -v
          
  build_e2e:
    name: build for e2e
    runs-on: windows-latest
    needs: [test, lint]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 1.26

      - name: GoReleaser snapshot build
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --snapshot --clean
          
      - name: Install Terraform CLI
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.8
          terraform_wrapper: false

      - name: E2E Tests
        env:
          TF_CLI_CONFIG_FILE: ${{ github.workspace }}/tests/e2e/terraform.tfrc.json
          TF_TOKEN_ORG: ${{ secrets.TF_TOKEN_ORG }}
        run: |
          # Run your E2E tests
          go test ./tests/e2e/... -v -count=1

  # --- Step 3: Build, Verify E2E Architecture, and Deploy ---
  build_release:
    name: build + goreleaser
    runs-on: windows-latest
    # needs: [test, lint]
    permissions:
      contents: write
      pull-requests: write
      actions: write
      id-token: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26

      - name: Extract metadata
        id: meta
        shell: pwsh
        run: |
          $rawVersion = "${{ github.ref_name }}"
          $cleanVersion = $rawVersion -replace '^v', ''

          "version=$cleanVersion" >> $env:GITHUB_OUTPUT
          "tag=$rawVersion" >> $env:GITHUB_OUTPUT

      - name: GoReleaser (build artifacts)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------------
      # Secure Passwordless Retrieval of App Assets from Azure Key Vault
      # ----------------------------------------------------------------------
      - name: Az CLI Login via OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch Secret from Azure Key Vault
        uses: azure/get-keyvault-secrets@v1
        with:
          keyvault: 'kv-tfcred'
          secrets: 'amiasea-github-private-key'
        id: kv-fetch

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.AMIASEA_GH_APP_ID }}
          private-key: ${{ steps.kv-fetch.outputs.amiasea-github-private-key }}
          owner: amiasea
          repositories: |
            terraform-credentials-tfcred

      # ----------------------------------------------------------------------
      # Trigger winget pipeline dispatch loop using GitHub App permissions
      # ----------------------------------------------------------------------
      - name: Trigger winget workflow
        uses: actions/github-script@v7
        env:
          WINGET_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          script: |
            // Instantiating custom client via App Token bypasses default GITHUB_TOKEN blocks
            const appOctokit = github.getOctokit(process.env.WINGET_TOKEN);
            
            await appOctokit.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "winget.yml",
              ref: "main",
              inputs: {
                version: "${{ steps.meta.outputs.version }}",
                tag: "${{ steps.meta.outputs.tag }}"
              }
            });
